<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Romantic gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a5acd;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradients for depth -->
    <radialGradient id="radialLight">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Subtle circles for depth -->
  <circle cx="400" cy="300" r="300" fill="url(#radialLight)"/>
  <circle cx="1500" cy="800" r="400" fill="url(#radialLight)"/>
  
  <!-- Decorative elements -->
  <path d="M 0 0 Q 480 270 960 0" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  <path d="M 960 1080 Q 1440 810 1920 1080" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
</svg>
