<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Left side decorative element -->
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="url(#leftGrad)" opacity="0.8"/>
  <circle cx="100" cy="100" r="45" fill="url(#leftGrad)" opacity="0.6"/>
  <circle cx="40" cy="150" r="25" fill="url(#leftGrad)" opacity="0.7"/>
  
  <!-- Connecting lines -->
  <path d="M 50 50 Q 75 75 100 100" stroke="#667eea" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 100 100 Q 70 125 40 150" stroke="#764ba2" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
